<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algebra 2 Placement Diagnostic & Curriculum Dashboard</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fafaf9;color:#292524;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{max-width:640px;background:white;border:1px solid #e7e5e4;border-radius:24px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
    .title{font-weight:900;font-size:20px;margin-bottom:8px}.msg{font-size:13px;color:#57534e;line-height:1.7}.err{margin-top:14px;white-space:pre-wrap;background:#1c1917;color:#fafaf9;border-radius:14px;padding:12px;font-size:11px}
  </style>
</head>
<body>
  <div class="box">
    <div class="title">Algebra 2 화면 복구 중...</div>
    <div class="msg">대시보드를 정상 로드하고, Gemini 입력칸 제거·GPT 프록시 연결·수식 렌더링을 적용하고 있습니다.</div>
    <div id="loader-error" class="err" style="display:none"></div>
  </div>
  <script>
    (async () => {
      const SOURCE_HTML = "https://raw.githubusercontent.com/docssam1/algebra2/36c30042f451105982955d820064bfd9d245d3fb/index.html";
      const DEFAULT_PROXY_URL = "http://localhost:3000/api/openai";
      const errorBox = document.getElementById("loader-error");

      function showError(error) {
        if (!errorBox) return;
        errorBox.style.display = "block";
        errorBox.textContent = String(error?.stack || error?.message || error || "Unknown loader error");
      }

      function installMathJax(html) {
        if (html.includes("tex-mml-chtml.js")) return html;
        const chartTag = '<script src="https://cdn.jsdelivr.net/npm/chart.js"></scr' + 'ipt>';
        const mathJaxTags = chartTag + `\n    <script>\n        window.MathJax = {\n            tex: {\n                inlineMath: [['$', '$'], ['\\\\(', '\\\\)']],\n                displayMath: [['$$', '$$'], ['\\\\[', '\\\\]']],\n                processEscapes: true\n            },\n            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }\n        };\n    </scr` + `ipt>\n    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></scr` + `ipt>`;
        return html.replace(chartTag, mathJaxTags);
      }

      function replaceHeaderUi(html) {
        const oldBlock = `<span class="font-bold text-indigo-800">🔑 Gemini API:</span>
                        <input type="password" id="gemini-api-key" placeholder="Google AI Studio API Key" class="bg-white border border-indigo-200 rounded px-2 py-0.5 w-44 focus:outline-none focus:ring-1 focus:ring-indigo-500 text-[10px]">
                        <button onclick="app.saveApiKey()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-2 py-0.5 rounded text-[10px] transition-all">저장</button>
                        <button onclick="app.verifyGeminiConnection()" class="bg-white hover:bg-indigo-50 text-indigo-700 border border-indigo-200 font-bold px-2 py-0.5 rounded text-[10px] transition-all">연결 확인</button>
                        <span id="api-status-badge" class="text-[10px] px-2 py-0.5 rounded-md font-bold">확인 중...</span>`;
        const newBlock = `<span class="font-bold text-indigo-800">🤖 GPT 엔진:</span>
                        <span class="text-[10px] text-indigo-900 bg-white border border-indigo-200 rounded px-2 py-0.5">OpenAI Proxy</span>
                        <button id="gpt-verify-btn" onclick="app.verifyGptProxyConnection(true)" class="bg-white hover:bg-indigo-50 text-indigo-700 border border-indigo-200 font-bold px-2 py-0.5 rounded text-[10px] transition-all">서버 확인</button>
                        <span id="api-status-badge" class="text-[10px] px-2 py-0.5 rounded-md font-bold cursor-help" title="OpenAI API Key는 브라우저가 아니라 GPT 프록시 서버에만 저장합니다.">확인 중...</span>
                        <span class="basis-full text-[10px] text-indigo-700/70 leading-snug">API Key는 브라우저에 저장하지 않고 서버 환경변수에서만 관리합니다.</span>`;
        return html.replace(oldBlock, newBlock);
      }

      function replaceAiConstant(html) {
        return html.replace('const GEMINI_MODEL = "gemini-2.0-flash-lite";', 'const GPT_PROXY_URL = window.GPT_PROXY_URL || localStorage.getItem("gpt_proxy_url") || "' + DEFAULT_PROXY_URL + '";');
      }

      const overrideScript = `\n<script>\n(function () {\n  const DEFAULT_GPT_PROXY_URL = localStorage.getItem('gpt_proxy_url') || 'http://localhost:3000/api/openai';\n  window.GPT_PROXY_URL = window.GPT_PROXY_URL || DEFAULT_GPT_PROXY_URL;\n\n  function getProxyUrl() {\n    return String(window.GPT_PROXY_URL || localStorage.getItem('gpt_proxy_url') || DEFAULT_GPT_PROXY_URL).trim();\n  }\n\n  function getHealthUrl() {\n    return getProxyUrl().replace(/\\/api\\/openai\\/?$/, '/api/health');\n  }\n\n  function getKoreanErrorMessage(category, fallback) {\n    const map = {\n      auth: 'OpenAI API Key 인증 오류입니다.',\n      rate_limit: 'OpenAI 요청량 제한에 걸렸습니다.',\n      billing: 'OpenAI 결제, 크레딧 또는 쿼터 문제가 있습니다.',\n      bad_request: '요청 형식이 올바르지 않습니다.',\n      server: 'GPT 중계 서버 또는 OpenAI 서버 오류입니다.',\n      network: '네트워크 또는 CORS 연결 오류입니다.',\n      unknown: '알 수 없는 GPT 연결 오류입니다.'\n    };\n    return map[category] || fallback || map.unknown;\n  }\n\n  function patchApp() {\n    if (typeof app === 'undefined') return false;\n\n    app.setApiStatusBadge = function (state, detail = '') {\n      const badge = document.getElementById('api-status-badge');\n      if (!badge) return;\n      const styles = {\n        idle: ['GPT 대기', 'text-[10px] bg-stone-100 text-stone-700 px-2 py-0.5 rounded-md font-bold cursor-help'],\n        checking: ['서버 확인 중', 'text-[10px] bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-md font-bold animate-pulse cursor-help'],\n        success: ['GPT 연결됨', 'text-[10px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-md font-bold cursor-help'],\n        auth: ['키/권한 오류', 'text-[10px] bg-rose-100 text-rose-800 px-2 py-0.5 rounded-md font-bold cursor-help'],\n        quota: ['요청 제한', 'text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-md font-bold cursor-help'],\n        request: ['요청 오류', 'text-[10px] bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-md font-bold cursor-help'],\n        network: ['서버 연결 오류', 'text-[10px] bg-violet-100 text-violet-800 px-2 py-0.5 rounded-md font-bold cursor-help']\n      };\n      const [label, className] = styles[state] || styles.idle;\n      const shortDetail = detail ? ': ' + String(detail).slice(0, 80) : '';\n      badge.textContent = label + shortDetail;\n      badge.className = className;\n      badge.title = detail || label;\n    };\n\n    app.updateApiKeyStatusBadge = function () { this.setApiStatusBadge('idle', 'GPT 프록시 모드: 브라우저에 API Key를 저장하지 않습니다.'); };\n    app.saveApiKey = function () { this.setApiStatusBadge('idle', 'GPT 프록시 주소는 서버 배포 후 운영 주소로 고정합니다.'); this.verifyGptProxyConnection(true); };\n    app.loadSavedApiKey = function () { this.updateApiKeyStatusBadge(); };\n    app.getApiKey = function () { return ''; };\n    app.getGeminiEndpoint = function () { return getProxyUrl(); };\n    app.getGeminiErrorMessage = function (result, fallback = 'AI request failed.') { return result?.message || result?.detail || result?.error?.message || fallback; };\n    app.verifyGeminiConnection = function (force = false) { return this.verifyGptProxyConnection(force); };\n\n    app.verifyGptProxyConnection = async function () {\n      if (this.isVerifyingGptProxy) return false;\n      const button = document.getElementById('gpt-verify-btn');\n      this.isVerifyingGptProxy = true;\n      if (button) button.disabled = true;\n      this.setApiStatusBadge('checking');\n      try {\n        const response = await fetch(getHealthUrl(), { method: 'GET' });\n        const result = await response.json().catch(() => ({}));\n        if (response.ok && result?.ok) {\n          this.setApiStatusBadge('success', result.model ? 'model: ' + result.model : 'OpenAI proxy ready');\n          return true;\n        }\n        this.setApiStatusBadge('network', result?.message || ('HTTP ' + response.status));\n      } catch (error) {\n        this.setApiStatusBadge('network', error?.message || 'GPT proxy connection failed');\n      } finally {\n        this.isVerifyingGptProxy = false;\n        if (button) button.disabled = false;\n      }\n      return false;\n    };\n\n    app.executeGeminiCall = async function (prompt, sysInstruction, schema = null, maxOutputTokens = null) {\n      const cacheKey = JSON.stringify({ prompt, sysInstruction, schema: !!schema, engine: 'openai-proxy' });\n      const cached = this.requestCache?.[cacheKey];\n      const now = Date.now();\n      if (cached && now - cached.ts < 60000) return cached.text;\n      try {\n        const response = await fetch(getProxyUrl(), {\n          method: 'POST',\n          headers: { 'Content-Type': 'application/json' },\n          body: JSON.stringify({ prompt: String(prompt), instructions: String(sysInstruction || ''), schema: schema || null, maxOutputTokens: maxOutputTokens || (schema ? 1400 : 1800) })\n        });\n        const result = await response.json().catch(() => ({}));\n        if (!response.ok || result?.ok === false) {\n          const category = result?.category || 'unknown';\n          const message = result?.message || result?.detail || getKoreanErrorMessage(category, 'GPT proxy request failed');\n          const state = category === 'auth' ? 'auth' : category === 'rate_limit' || category === 'billing' ? 'quota' : category === 'bad_request' ? 'request' : 'network';\n          this.setApiStatusBadge(state, message);\n          throw new Error(message);\n        }\n        const text = String(result?.text || '').trim();\n        if (!text) throw new Error('AI 응답 본문이 비어 있습니다.');\n        this.setApiStatusBadge('success');\n        if (!this.requestCache) this.requestCache = {};\n        this.requestCache[cacheKey] = { text, ts: Date.now() };\n        return text;\n      } catch (error) {\n        this.setApiStatusBadge('network', error?.message || 'GPT proxy request failed');\n        throw error;\n      }\n    };\n    app.executeAiCall = app.executeGeminiCall.bind(app);\n    return true;\n  }\n\n  if (!patchApp()) document.addEventListener('DOMContentLoaded', patchApp);\n})();\n</scr` + `ipt>`;

      try {
        const response = await fetch(SOURCE_HTML, { cache: "no-store" });
        if (!response.ok) throw new Error("원본 대시보드 로드 실패: HTTP " + response.status);
        let html = await response.text();
        html = installMathJax(html);
        html = replaceHeaderUi(html);
        html = replaceAiConstant(html);
        const insertAt = html.lastIndexOf("</body>");
        if (insertAt === -1) throw new Error("원본 HTML에서 마지막 body 닫힘을 찾지 못했습니다.");
        html = html.slice(0, insertAt) + overrideScript + "\n" + html.slice(insertAt);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        showError(error);
      }
    })();
  </script>
</body>
</html>
