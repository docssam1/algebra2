<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algebra 2 Placement Diagnostic & Curriculum Dashboard</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fafaf9;color:#292524;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{max-width:560px;background:white;border:1px solid #e7e5e4;border-radius:24px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
    .title{font-weight:900;font-size:20px;margin-bottom:8px}
    .msg{font-size:13px;color:#57534e;line-height:1.7}
    .err{margin-top:14px;white-space:pre-wrap;background:#1c1917;color:#fafaf9;border-radius:14px;padding:12px;font-size:11px}
  </style>
</head>
<body>
  <div class="box">
    <div class="title">Algebra 2 GPT Proxy 로딩 중...</div>
    <div class="msg">기존 대시보드를 불러온 뒤 Gemini 직통 호출을 GPT 프록시 호출로 전환하고 있습니다.</div>
    <div id="loader-error" class="err" style="display:none"></div>
  </div>
  <script>
    (async () => {
      const SOURCE_HTML = "https://raw.githubusercontent.com/docssam1/algebra2/36c30042f451105982955d820064bfd9d245d3fb/index.html";
      const errorBox = document.getElementById("loader-error");

      function showError(error) {
        if (errorBox) {
          errorBox.style.display = "block";
          errorBox.textContent = String(error?.stack || error?.message || error || "Unknown loader error");
        }
      }

      const overrideScript = `
<script>
(function () {
  const DEFAULT_GPT_PROXY_URL = localStorage.getItem('gpt_proxy_url') || 'http://localhost:3000/api/openai';
  window.GPT_PROXY_URL = window.GPT_PROXY_URL || DEFAULT_GPT_PROXY_URL;

  function getProxyUrl() {
    return (window.GPT_PROXY_URL || localStorage.getItem('gpt_proxy_url') || DEFAULT_GPT_PROXY_URL).trim();
  }

  function getHealthUrl() {
    return getProxyUrl().replace(/\\/api\\/openai\\/?$/, '/api/health');
  }

  function updateGptUi() {
    const input = document.getElementById('gemini-api-key');
    const badge = document.getElementById('api-status-badge');

    if (input) {
      input.type = 'text';
      input.id = 'gpt-proxy-url';
      input.placeholder = 'GPT Proxy URL';
      input.value = getProxyUrl();
      input.className = input.className.replace('w-44', 'w-64');
      const wrap = input.closest('div');
      if (wrap) {
        const label = wrap.querySelector('span.font-bold');
        if (label) label.textContent = '🤖 GPT 서버:';
        const buttons = wrap.querySelectorAll('button');
        if (buttons[0]) buttons[0].textContent = '주소 저장';
        if (buttons[1]) buttons[1].textContent = '서버 확인';
      }
    }

    if (badge) {
      badge.classList.add('cursor-help');
      badge.title = '브라우저에는 OpenAI API Key를 저장하지 않습니다. GPT 프록시 서버만 호출합니다.';
    }
  }

  function getInputProxyUrl() {
    return (document.getElementById('gpt-proxy-url')?.value || getProxyUrl()).trim();
  }

  function getKoreanErrorMessage(category, fallback) {
    const map = {
      auth: 'OpenAI API Key 인증 오류입니다.',
      rate_limit: 'OpenAI 요청량 제한에 걸렸습니다.',
      billing: 'OpenAI 결제, 크레딧 또는 쿼터 문제가 있습니다.',
      bad_request: '요청 형식이 올바르지 않습니다.',
      server: 'GPT 중계 서버 또는 OpenAI 서버 오류입니다.',
      network: '네트워크 또는 CORS 연결 오류입니다.',
      unknown: '알 수 없는 GPT 연결 오류입니다.'
    };
    return map[category] || fallback || map.unknown;
  }

  function patchApp() {
    if (typeof app === 'undefined') return false;

    app.setApiStatusBadge = function (state, detail = '') {
      const badge = document.getElementById('api-status-badge');
      if (!badge) return;

      const styles = {
        idle: ['GPT 대기', 'text-[10px] bg-stone-100 text-stone-700 px-2 py-0.5 rounded-md font-bold cursor-help'],
        checking: ['서버 확인 중', 'text-[10px] bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-md font-bold animate-pulse cursor-help'],
        success: ['GPT 연결됨', 'text-[10px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-md font-bold cursor-help'],
        auth: ['키/권한 오류', 'text-[10px] bg-rose-100 text-rose-800 px-2 py-0.5 rounded-md font-bold cursor-help'],
        quota: ['요청 제한', 'text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-md font-bold cursor-help'],
        request: ['요청 오류', 'text-[10px] bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-md font-bold cursor-help'],
        network: ['서버 연결 오류', 'text-[10px] bg-violet-100 text-violet-800 px-2 py-0.5 rounded-md font-bold cursor-help']
      };

      const [label, className] = styles[state] || styles.idle;
      const shortDetail = detail ? ': ' + String(detail).slice(0, 80) : '';
      badge.textContent = label + shortDetail;
      badge.className = className;
      badge.title = detail || label;
    };

    app.updateApiKeyStatusBadge = function () {
      this.setApiStatusBadge('idle', 'GPT 프록시 모드: 브라우저에 API Key를 저장하지 않습니다.');
    };

    app.saveApiKey = function () {
      const proxyUrl = getInputProxyUrl();
      localStorage.setItem('gpt_proxy_url', proxyUrl);
      window.GPT_PROXY_URL = proxyUrl;
      this.setApiStatusBadge('idle', 'GPT 프록시 주소 저장됨');
      this.verifyGptProxyConnection(true);
    };

    app.loadSavedApiKey = function () {
      setTimeout(updateGptUi, 0);
    };

    app.getApiKey = function () {
      return '';
    };

    app.getGeminiEndpoint = function () {
      return getProxyUrl();
    };

    app.getGeminiErrorMessage = function (result, fallback = 'AI request failed.') {
      return result?.message || result?.detail || result?.error?.message || fallback;
    };

    app.verifyGeminiConnection = function (force = false) {
      return this.verifyGptProxyConnection(force);
    };

    app.verifyGptProxyConnection = async function () {
      if (this.isVerifyingGptProxy) return false;
      const button = document.querySelector('button[onclick*="verifyGeminiConnection"], #gpt-verify-btn');
      this.isVerifyingGptProxy = true;
      if (button) button.disabled = true;
      this.setApiStatusBadge('checking');

      try {
        const response = await fetch(getHealthUrl(), { method: 'GET' });
        const result = await response.json().catch(() => ({}));
        if (response.ok && result?.ok) {
          this.setApiStatusBadge('success', result.model ? 'model: ' + result.model : 'OpenAI proxy ready');
          return true;
        }
        this.setApiStatusBadge('network', result?.message || ('HTTP ' + response.status));
      } catch (error) {
        this.setApiStatusBadge('network', error?.message || 'GPT proxy connection failed');
      } finally {
        this.isVerifyingGptProxy = false;
        if (button) button.disabled = false;
      }
      return false;
    };

    app.executeGeminiCall = async function (prompt, sysInstruction, schema = null, maxOutputTokens = null) {
      const cacheKey = JSON.stringify({ prompt, sysInstruction, schema: !!schema, engine: 'openai-proxy' });
      const cached = this.requestCache?.[cacheKey];
      const now = Date.now();
      if (cached && now - cached.ts < 60000) return cached.text;

      try {
        const response = await fetch(getProxyUrl(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: String(prompt),
            instructions: String(sysInstruction || ''),
            schema: schema || null,
            maxOutputTokens: maxOutputTokens || (schema ? 1400 : 1800)
          })
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok || result?.ok === false) {
          const category = result?.category || 'unknown';
          const message = result?.message || result?.detail || getKoreanErrorMessage(category, 'GPT proxy request failed');
          const state = category === 'auth' ? 'auth'
            : category === 'rate_limit' || category === 'billing' ? 'quota'
            : category === 'bad_request' ? 'request'
            : 'network';
          this.setApiStatusBadge(state, message);
          throw new Error(message);
        }

        const text = String(result?.text || '').trim();
        if (!text) throw new Error('AI 응답 본문이 비어 있습니다.');

        this.setApiStatusBadge('success');
        if (!this.requestCache) this.requestCache = {};
        this.requestCache[cacheKey] = { text, ts: Date.now() };
        return text;
      } catch (error) {
        this.setApiStatusBadge('network', error?.message || 'GPT proxy request failed');
        throw error;
      }
    };

    app.executeAiCall = app.executeGeminiCall.bind(app);

    updateGptUi();
    return true;
  }

  if (!patchApp()) {
    document.addEventListener('DOMContentLoaded', () => {
      patchApp();
      updateGptUi();
    });
  } else {
    document.addEventListener('DOMContentLoaded', updateGptUi);
  }
})();
</scr` + `ipt>`;

      try {
        const response = await fetch(SOURCE_HTML, { cache: "no-store" });
        if (!response.ok) throw new Error("원본 대시보드 로드 실패: HTTP " + response.status);
        let html = await response.text();
        html = html.replace("</body>", overrideScript + "\n</body>");
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        showError(error);
      }
    })();
  </script>
</body>
</html>
