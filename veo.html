<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>만화 → 애니 영상 만들기 (Veo 3.1)</title>
<style>
  body{ font-family:-apple-system,"Noto Sans KR",sans-serif; max-width:720px;
        margin:28px auto; padding:0 16px; color:#1a1a1a; }
  h1{ font-size:1.3rem; } h2{ font-size:1.02rem; margin:0 0 8px; }
  .box{ border:1px solid #e3e3e3; border-radius:12px; padding:18px; margin-top:16px; }
  .ings{ display:flex; gap:12px; flex-wrap:wrap; }
  .ing{ width:150px; }
  .drop{ position:relative; width:150px; height:110px; border:2px dashed #bbb;
         border-radius:8px; background:#fafafa; cursor:pointer; overflow:hidden;
         display:flex; align-items:center; justify-content:center; }
  .drop.drag{ border-color:#2563eb; background:#eef3ff; }
  .drop img{ width:100%; height:100%; object-fit:cover; display:none; }
  .drop .hint{ font-size:.78rem; color:#888; text-align:center; padding:4px; }
  .ing input[type=file]{ display:none; }
  textarea{ width:100%; box-sizing:border-box; min-height:96px; margin-top:10px;
            padding:11px; border:1px solid #ccc; border-radius:8px; font-size:.96rem; line-height:1.5; }
  label{ font-weight:600; display:block; margin-top:6px; }
  .opt{ font-size:.85rem; color:#666; }
  button{ margin-top:14px; padding:12px 22px; border:0; border-radius:8px;
          background:#2563eb; color:#fff; font-size:1rem; cursor:pointer; }
  button:disabled{ background:#9ca3af; cursor:not-allowed; }
  .stat{ font-size:.88rem; color:#555; margin-top:10px; white-space:pre-wrap; }
  video{ width:100%; margin-top:14px; border-radius:10px; display:none; }
  a.dl{ display:none; margin-top:10px; font-size:1rem; }
</style>
</head>
<body>
  <h1>만화 → 애니 영상 만들기</h1>
  <p class="opt">사진(재료)을 최대 3장 올리고 대본을 쓴 뒤 <b>영상 만들기</b>를 누르면,
     일본 애니풍 8초 영상이 만들어집니다. 다 되면 다운로드하세요.</p>

  <div class="box">
    <h2>① 사진 (최대 3장 — 끌어다 놓기 · 클릭 · 붙여넣기 Ctrl+V)</h2>
    <div class="ings">
      <div class="ing"><div class="drop" id="d0"><span class="hint">끌어다 놓기<br>클릭 · Ctrl+V</span><img id="t0"></div><input type="file" id="f0" accept="image/png,image/jpeg"></div>
      <div class="ing"><div class="drop" id="d1"><span class="hint">끌어다 놓기<br>클릭 · Ctrl+V</span><img id="t1"></div><input type="file" id="f1" accept="image/png,image/jpeg"></div>
      <div class="ing"><div class="drop" id="d2"><span class="hint">끌어다 놓기<br>클릭 · Ctrl+V</span><img id="t2"></div><input type="file" id="f2" accept="image/png,image/jpeg"></div>
    </div>

    <label>② 대본 / 설명</label>
    <textarea id="prompt" placeholder="예) 유준이 네스프레소 머신으로 커피를 내리며 향을 맡고 한국어로 '와~ 커피 냄새 진짜 좋다!' 라고 말한다. 따뜻한 아침 주방, 일본 애니 화풍."></textarea>

    <button id="make">영상 만들기</button>
    <div class="stat" id="stat"></div>
    <video id="result" controls></video>
    <a id="download" class="dl" download="영상.mp4">⬇ 영상 다운로드</a>
  </div>

  <p class="opt">여러 개(8초)를 한 편으로 이어붙이고 싶으면, 만든 영상들을 다운로드해서
     코워크(Claude)에 올리면 타이틀 카드까지 붙여 한 편으로 합쳐드립니다.</p>

<script>
  const API_BASE = "https://algebra2-gemini-proxy-v2-243382036810.asia-northeast3.run.app";
  const $ = (id)=>document.getElementById(id);
  const ing = [null,null,null];

  function setImage(i, file){
    if(!file || !file.type.startsWith("image/")){ return; }
    const r=new FileReader();
    r.onload=()=>{
      ing[i]={base64:r.result, mimeType:file.type};
      const img=$(`t${i}`); img.src=r.result; img.style.display="block";
      const hint=$(`d${i}`).querySelector(".hint"); if(hint) hint.style.display="none";
    };
    r.readAsDataURL(file);
  }
  function firstEmpty(){ return ing.findIndex(x=>!x); }

  [0,1,2].forEach(i=>{
    const slot=$(`d${i}`), input=$(`f${i}`);
    slot.addEventListener("click", ()=> input.click());
    input.addEventListener("change", e=> setImage(i, e.target.files[0]));
    ["dragenter","dragover"].forEach(ev=>
      slot.addEventListener(ev, e=>{ e.preventDefault(); slot.classList.add("drag"); }));
    ["dragleave","dragend"].forEach(ev=>
      slot.addEventListener(ev, e=>{ e.preventDefault(); slot.classList.remove("drag"); }));
    slot.addEventListener("drop", e=>{
      e.preventDefault(); slot.classList.remove("drag");
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      setImage(i, f);
    });
  });

  // 붙여넣기(Ctrl+V): 클립보드 이미지를 빈 칸에 자동 추가
  window.addEventListener("paste", (e)=>{
    const items = e.clipboardData && e.clipboardData.items;
    if(!items) return;
    for(const it of items){
      if(it.type && it.type.startsWith("image/")){
        const f = it.getAsFile();
        const idx = firstEmpty();
        if(idx===-1){ alert("사진 칸 3개가 모두 찼어요."); return; }
        setImage(idx, f);
        e.preventDefault();
        break;
      }
    }
  });

  $("make").addEventListener("click", async ()=>{
    const images = ing.filter(Boolean);
    if(images.length===0){ alert("재료 사진을 최소 1장 올려주세요."); return; }
    if(!$("prompt").value.trim()){ alert("대본/설명을 입력하세요."); return; }
    $("make").disabled=true;
    $("result").style.display="none"; $("download").style.display="none";
    setStat("영상 생성 요청 중…");
    try{
      const start = await postJSON(`${API_BASE}/api/video`, {
        prompt: $("prompt").value, images, aspectRatio:"16:9", durationSeconds:8
      });
      const op = start.operationName;
      setStat("영상 생성 중… (수십 초~수 분 걸려요)");
      let result=null;
      for(let k=0;k<50;k++){
        await sleep(12000);
        const s = await postJSON(`${API_BASE}/api/video/status`, { operationName: op });
        if(s.done){ if(s.error) throw new Error(JSON.stringify(s.error)); result=s; break; }
        setStat(`영상 생성 중… (${(k+1)*12}초 경과)`);
      }
      if(!result || !result.videoBase64) throw new Error("영상 수신 실패 (시간 초과일 수 있어요)");
      const src=`data:${result.mimeType};base64,${result.videoBase64}`;
      $("result").src=src; $("result").style.display="block";
      $("download").href=src; $("download").style.display="inline-block";
      setStat("완성! 아래에서 재생하고 다운로드하세요.");
    }catch(err){ setStat("오류: "+err.message); }
    finally{ $("make").disabled=false; }
  });

  async function postJSON(url, body){
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await r.json();
    if(!r.ok) throw new Error(JSON.stringify(data));
    return data;
  }
  function setStat(t){ $("stat").textContent=t; }
  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
</script>
</body>
</html>
